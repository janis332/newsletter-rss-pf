name: Generate Weekly RSS

on:
  push:
    paths:
      - "generate-rss.js"
      - "package.json"
      - ".github/workflows/**"
  schedule:
    - cron: "0 11 1 * *"
  workflow_dispatch:

env:
  TZ: Europe/Berlin

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node generate-rss.js

      - name: Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feed.xml
          git commit -m "Auto-update RSS $(date)" || echo "No changes"
          git push

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp feed.xml site/feed.xml
          cat > site/index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>newsletter-rss-pf</title>
          </head>
          <body>
            <h1>RSS Feed</h1>
            <p><a href="./feed.xml">Open feed.xml</a></p>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
